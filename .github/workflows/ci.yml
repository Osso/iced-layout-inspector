name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lib/iced-layout-inspector

      - uses: actions/checkout@v4
        with:
          repository: Osso/peercred-ipc
          path: lib/peercred-ipc

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lib/iced-layout-inspector

      - name: Check formatting
        working-directory: lib/iced-layout-inspector
        run: cargo fmt --check

      - name: Clippy
        working-directory: lib/iced-layout-inspector
        run: cargo clippy

      - name: Build
        working-directory: lib/iced-layout-inspector
        run: cargo build

      - name: Run tests
        working-directory: lib/iced-layout-inspector
        run: cargo test
